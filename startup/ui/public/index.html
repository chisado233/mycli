<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Startup Commands UI</title><link rel="stylesheet" href="/styles.css"></head><body><main class="app"><section class="hero"><div><p class="kicker">mycli startup</p><h1>Boot Sequence</h1><p>管理 Windows 登录时自动运行的 mycli commands，查看计划任务安装状态，并可手动触发所有 enabled 启动项。</p></div><div class="actions"><button id="refresh">刷新</button><button id="install">安装/更新计划任务</button><button id="runAll">立即运行 enabled</button></div></section><section class="stats"><div><b id="total">0</b><span>commands</span></div><div><b id="enabled">0</b><span>enabled</span></div><div><b id="installed">?</b><span>task installed</span></div></section><section class="panel"><div class="panel-title"><span>启动项</span><span id="taskState">scheduler</span></div><div id="commands" class="commands"></div></section><section class="panel"><div class="panel-title"><span>执行回显</span><button id="clear">清空</button></div><pre id="log">准备就绪。</pre></section></main><script src="/app.js"></script></body></html>
