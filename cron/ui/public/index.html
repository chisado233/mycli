<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cron Scheduler UI</title><link rel="stylesheet" href="/styles.css"></head><body><main class="app"><section class="hero"><div><p class="kicker">mycli cron</p><h1>Scheduler Deck</h1><p>查看 Windows Task Scheduler 注册的 mycli cron 任务、下次运行时间、最近执行与即时控制。</p></div><button id="refresh">刷新</button></section><section class="stats"><div><b id="total">0</b><span>total</span></div><div><b id="enabled">0</b><span>enabled</span></div><div><b id="persistent">0</b><span>persistent</span></div><div><b id="failed">0</b><span>failed last run</span></div></section><section class="layout"><aside class="list"><div class="list-head">任务列表</div><div id="tasks"></div></aside><section class="detail"><div class="panel-title"><span id="title">选择任务</span><span id="badge">idle</span></div><div id="meta" class="meta"></div><div class="buttons"><button id="run" disabled>立即运行</button><button id="enable" disabled>启用</button><button id="disable" disabled>禁用</button></div><pre id="detail">等待选择任务。</pre></section></section></main><script src="/app.js"></script></body></html>
